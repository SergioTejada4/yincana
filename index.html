<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de preguntas</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        background: #f4f7fb;
        color: #14213d;
      }
      .app {
        max-width: 860px;
        margin: 0 auto;
        padding: 18px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 8px 30px rgba(20, 33, 61, 0.08);
        margin-bottom: 16px;
      }
      h1, h2 {
        margin-top: 0;
      }
      .question-block {
        border: 1px solid #d9e2f2;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fcfdff;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 8px 0 4px;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #c8d4e4;
        border-radius: 10px;
        font: inherit;
      }
      textarea {
        min-height: 70px;
        resize: vertical;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #1f6feb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #6c757d;
      }
      button.danger {
        background: #d9534f;
      }
      .muted {
        color: #5c6b82;
        font-size: 0.95rem;
      }
      .seed-box {
        width: 100%;
        min-height: 120px;
        font-family: Consolas, monospace;
        background: #0f172a;
        color: #e2e8f0;
      }
      .qr-output {
        display: flex;
        justify-content: center;
        padding: 12px 0 0;
      }
      .qr-output img {
        width: 220px;
        max-width: 100%;
        border-radius: 12px;
        border: 1px solid #d9e2f2;
        background: white;
      }
      @media (max-width: 600px) {
        .app { padding: 10px; }
        .card { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Generador de preguntas</h1>
        <p class="muted">Crea preguntas con respuesta correcta, premio y genera una SEED compacta y reproducible.</p>
        <div class="actions">
          <a href="player.html"><button type="button">Ir al jugador</button></a>
          <button id="add-question" type="button">Añadir pregunta</button>
          <button id="generate-seed" type="button">Generar SEED</button>
        </div>
      </section>

      <section class="card">
        <div id="questions-list"></div>
      </section>

      <section class="card">
        <h2>SEED generada</h2>
        <label for="seed-output">SEED</label>
        <textarea id="seed-output" class="seed-box" placeholder="Aquí aparecerá la SEED"></textarea>
        <label for="share-output">Enlace compartible</label>
        <textarea id="share-output" class="seed-box" placeholder="Aquí aparecerá el enlace listo para compartir"></textarea>
        <div id="qr-output" class="qr-output"></div>
        <div class="actions">
          <button id="copy-seed" type="button">Copiar SEED</button>
          <button id="copy-link" type="button">Copiar enlace</button>
          <button id="generate-qr" type="button">Generar QR</button>
          <button id="download-seed" type="button">Descargar SEED</button>
          <button id="load-seed" type="button" class="secondary">Cargar SEED</button>
          <input id="seed-file" type="file" accept=".txt,.seed,.json" hidden />
          <button id="load-file" type="button" class="secondary">Cargar desde archivo</button>
        </div>
        <p class="muted">La SEED se codifica de forma determinista con LZ-String, así que no depende de un valor aleatorio.</p>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="generator.js"></script>
  </body>
</html>
