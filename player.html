<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jugador de preguntas</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        background: #f4f7fb;
        color: #14213d;
      }
      .app {
        max-width: 760px;
        margin: 0 auto;
        padding: 18px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 8px 30px rgba(20, 33, 61, 0.08);
        margin-bottom: 16px;
      }
      h1, h2 {
        margin-top: 0;
      }
      textarea, input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #c8d4e4;
        border-radius: 10px;
        font: inherit;
      }
      textarea {
        min-height: 100px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #1f6feb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #6c757d;
      }
      .question-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .reward {
        white-space: pre-wrap;
        background: #f2fbf4;
        border: 1px solid #b8e8c6;
        padding: 12px;
        border-radius: 12px;
        margin-top: 12px;
      }
      .muted {
        color: #5c6b82;
        font-size: 0.95rem;
      }
      @media (max-width: 600px) {
        .app { padding: 10px; }
        .card { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Jugador de preguntas</h1>
        <p id="seed-status" class="muted">No se ha recibido una SEED en la URL. Puedes abrir este juego desde un enlace compartido o cargar una manualmente.</p>
        <button id="show-manual-loader" type="button" class="secondary">Cargar una SEED manualmente</button>
        <div id="manual-loader" hidden>
          <label for="seed-input">SEED manual</label>
          <textarea id="seed-input" placeholder="Pega aquí la SEED"></textarea>
          <div class="actions">
            <button id="load-seed" type="button">Cargar SEED</button>
          </div>
        </div>
        <div class="actions">
          <a href="index.html"><button type="button" class="secondary">Volver al generador</button></a>
        </div>
      </section>

      <section id="game-panel" class="card" hidden>
        <div id="progress" class="muted"></div>
        <div id="question-box"></div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="player.js"></script>
  </body>
</html>
