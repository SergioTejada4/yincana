<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo</title>
    <script>
      (function () {
        const path = window.location.pathname;
        const match = path.match(/\/player\.html\/(.+)$/);
        if (match) {
          const seed = decodeURIComponent(match[1]);
          const target = `${window.location.origin}${window.location.pathname.replace(/\/player\.html\/.+$/, '/player.html')}?seed=${encodeURIComponent(seed)}`;
          window.location.replace(target);
        } else {
          window.location.replace(`${window.location.origin}${window.location.pathname}`);
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirigiendo...</p>
  </body>
</html>
